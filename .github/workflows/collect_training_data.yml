name: AstraAir Daily Dataset Collection

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Earth Engine credentials
        env:
          EE_CREDENTIALS: ${{ secrets.EE_CREDENTIALS }}
        run: |
          mkdir -p ~/.config/earthengine
          echo "$EE_CREDENTIALS" > ~/.config/earthengine/credentials

      - name: Collect AstraAir training data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m scripts.collect_training_data

      - name: Validate dataset
        run: |
          python -m scripts.validate_training_data

      - name: Commit dataset changes
        run: |
          git config user.name "astraair-data-bot"
          git config user.email "astraair-data-bot@users.noreply.github.com"

          git add data/training/environmental_training_data.csv

          if git diff --cached --quiet; then
            echo "No dataset changes"
          else
            git commit -m "Update AstraAir environmental training dataset"
            git push
          fi